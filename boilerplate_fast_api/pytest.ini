[pytest]
# Raiz do projeto — o pytest roda a partir daqui
testpaths = src/tests

# Adiciona a raiz do projeto ao sys.path para que `import src.*` funcione
pythonpath = .

# Saída detalhada por padrão
addopts = -v --tb=short

# Desativa warnings do APScheduler em ambiente de teste (não precisa do scheduler)
filterwarnings =
    ignore::DeprecationWarning
